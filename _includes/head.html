<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}
{% if page.noindex %}<meta name="robots" content="noindex, follow">{% endif %}

<!-- Content Security Policy: whitelist known external script/resource domains -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline';
  font-src 'self';
  img-src 'self' data: https://www.googletagmanager.com;
  connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://region1.google-analytics.com;
  frame-src https://www.googletagmanager.com;
">

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}" sizes="32x32">
<link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}" sizes="192x192">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.png' | relative_url }}">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- WebSite Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Breezy Risk",
  "url": "{{ site.url }}",
  "description": "{{ site.description }}",
  "publisher": { "@id": "{{ site.url }}/#organization" }
}
</script>

<!-- Site Identity Schema (canonical: ProfessionalService + Person) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "ProfessionalService",
      "@id": "{{ site.url }}/#organization",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}",
      "logo": "{{ site.url }}/assets/images/breezy-logo.png",
      "image": "{{ site.url }}/assets/images/breezy-og-default.png",
      "description": "{{ site.description }}",
      "foundingDate": "2025",
      "founder": { "@id": "{{ site.url }}/#joerg" },
      "email": "{{ site.email }}",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "{{ site.email }}"
      },
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "PA",
        "addressCountry": "US"
      },
      "areaServed": {
        "@type": "Country",
        "name": "United States"
      },
      "priceRange": "Low four figures, fixed fee",
      "serviceType": [
        "Insurance Audit",
        "Policy Review",
        "Risk Intelligence Report",
        "Coverage Gap Analysis",
        "Policy Interaction Analysis",
        "Cyber Liability Analysis",
        "Fidelity Bond Analysis",
        "Directors and Officers (D&O) Analysis",
        "Vendor Coverage Alignment",
        "Regulatory Response Readiness",
        "Security Warranty Compliance"
      ],
      "slogan": "I don't place policies. I audit them.",
      "audience": [
        { "@type": "Audience", "audienceType": "Community Banks" },
        { "@type": "Audience", "audienceType": "Credit Unions" }
      ],
      "knowsAbout": [
        "Community Bank Insurance",
        "Credit Union Insurance",
        "Cyber Insurance",
        "Fidelity Bond",
        "D&O Insurance",
        "Wire Fraud Coverage",
        "FDIC Examination",
        "NCUA Compliance",
        "FFIEC Guidance",
        "23 NYCRR 500",
        "Policy Interaction Analysis",
        "Risk Intelligence Report",
        "Ransomware Coverage",
        "Social Engineering Coverage",
        "Vendor Insurance Requirements",
        "Security Warranty Compliance"
      ],
      "sameAs": [
        "https://www.linkedin.com/company/breezy-risk-advisors"
      ]
    },
    {
      "@type": "Person",
      "@id": "{{ site.url }}/#joerg",
      "name": "{{ site.author }}",
      "jobTitle": "Independent Risk Advisor",
      "url": "{{ site.url }}/about/",
      "image": "{{ site.url }}/assets/images/joerg-portrait.jpg",
      "description": "Independent Risk Advisor with 20+ years of insurance industry experience spanning carriers (Chubb, CNA), insurtech startups, and MGAs. Founded a parametric insurance startup. Served as COO of a cyber insurance MGA. Early career in cybersecurity at Siemens. Master's in Electrical Engineering, MBA from London Business School. Audits insurance programs for community banks and credit unions. Does not sell, place, or broker insurance.",
      "worksFor": { "@id": "{{ site.url }}/#organization" },
      "alumniOf": [
        { "@type": "CollegeOrUniversity", "name": "Karlsruhe Institute of Technology" },
        { "@type": "CollegeOrUniversity", "name": "London Business School" }
      ],
      "hasCredential": [
        {
          "@type": "EducationalOccupationalCredential",
          "credentialCategory": "degree",
          "name": "MBA",
          "recognizedBy": { "@type": "EducationalOrganization", "name": "London Business School" }
        },
        {
          "@type": "EducationalOccupationalCredential",
          "credentialCategory": "degree",
          "name": "Master's in Electrical Engineering"
        }
      ],
      "knowsAbout": [
        "Community Bank Insurance",
        "Credit Union Insurance",
        "Cyber Insurance",
        "Fidelity Bond",
        "D&O Insurance",
        "Professional Liability",
        "Cybersecurity",
        "Policy Interaction Analysis",
        "Coverage Gap Analysis"
      ],
      "sameAs": [
        "{{ site.linkedin }}",
        "https://www.linkedin.com/company/breezy-risk-advisors"
      ]
    }
  ]
}
</script>

{% include analytics.html %}
