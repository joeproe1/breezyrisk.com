<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  /* Open this file in a browser at 100% zoom and screenshot at 1200x630.
     The card has an exact 1200x630 boundary — screenshot that box. */

  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=DM+Sans:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .og-card {
    width: 1200px;
    height: 630px;
    background: #0f2137;
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* Teal accent line near bottom */
  .og-card::after {
    content: '';
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    height: 1px;
    background: #00D4AA;
    opacity: 0.5;
  }

  /* Decorative arcs on the right side */
  .arcs {
    position: absolute;
    top: 20px;
    right: -80px;
    width: 400px;
    height: 400px;
  }

  .arc {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0, 212, 170, 0.15);
  }

  .arc-1 {
    width: 320px;
    height: 320px;
    top: 40px;
    right: 20px;
  }

  .arc-2 {
    width: 280px;
    height: 280px;
    top: 60px;
    right: 0px;
  }

  .arc-3 {
    width: 240px;
    height: 240px;
    top: 80px;
    right: -20px;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 1;
    padding: 100px 80px 80px;
    max-width: 750px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 64px;
    color: #ffffff;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo span {
    color: #00D4AA;
  }

  .company-name {
    font-size: 18px;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 16px;
    letter-spacing: 0.5px;
  }

  .tagline {
    font-size: 30px;
    font-weight: 700;
    color: #ffffff;
    margin-top: 40px;
    line-height: 1.3;
  }

  .url {
    position: absolute;
    bottom: 24px;
    left: 80px;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="og-card">
    <!-- Decorative arcs -->
    <div class="arcs">
      <div class="arc arc-1"></div>
      <div class="arc arc-2"></div>
      <div class="arc arc-3"></div>
    </div>

    <div class="content">
      <div class="logo">BREEZY<span>.risk</span></div>
      <div class="company-name">Breezy Risk</div>
      <div class="tagline">Independent Community Bank<br>Insurance Audits</div>
    </div>

    <div class="url">breezyrisk.com</div>
  </div>
</body>
</html>
