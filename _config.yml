# Site settings
title: Breezy Risk
description: "Independent insurance audit for community banks and credit unions. I review your cyber, fidelity bond, and D&O policies line by line to find the gaps that surface at examinations and claims, not at renewals."
url: "https://breezyrisk.com"
baseurl: ""
author: Joerg Proeve

# Contact info
email: contact@breezyrisk.com
phone: "(717) 490-7670"
linkedin: "https://www.linkedin.com/in/joergproeve/"

# Build settings
markdown: kramdown
permalink: /insights/:title/

# Plugins (all GitHub Pages whitelisted)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

# SEO tag defaults
twitter:
  card: summary_large_image
  creator: false

# Feed settings
feed:
  path: /feed/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CNAME
  - .gitignore

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      image: /assets/images/breezy-og-default.png
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Joerg Proeve"
      image: /assets/images/breezy-og-default.png

# Collections
collections_dir: ""

# Sass
sass:
  style: compressed
  sass_dir: _sass
